<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book | Holidae Travel Co.</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Booking page header navigation -->
<header class="top">
  <div class="top-wrap">
    <a class="logo" href="index.html">Holidae Travel Co.</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="adventure.html">Trips</a>
      <a class="current" href="contact.html">Book</a>
    </nav>
  </div>
</header>
<main>
  <!-- Booking page intro text -->
  <div class="intro">
    <h1>Start Your Booking</h1>
    <p>Share a few details and our team will prepare a tailored next-step plan for your selected trip.</p>
  </div>

  <!-- Booking form inputs area -->
  <div class="form-layout">
    <form class="sheet" id="booking-form">
      <label>Full Name <input name="name" id="name" required autocomplete="name"></label>
      <label>Email Address <input type="email" name="email" id="email" required autocomplete="email"></label>
      <label>Select a Trip
        <select name="trip" id="trip-select" required>
          <option value="" selected disabled>Choose one option</option>
          <option value="mountain">Alpine Mountain Escape</option>
          <option value="safari">East Africa Safari Circuit</option>
          <option value="diving">Tropical Diving Getaway</option>
        </select>
      </label>
      <label>Travel Notes <textarea name="notes" id="notes" rows="4" placeholder="Preferred dates, dietary restrictions, travel pace, or other details"></textarea></label>
      <button type="submit" class="btn btn-primary">Submit Request</button>
      <p class="msg" id="form-message" role="status"></p>
    </form>
